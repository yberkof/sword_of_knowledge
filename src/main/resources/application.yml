server:
  port: ${PORT:8080}

spring:
  application:
    name: spring-backend
  datasource:
    # JDBC only: jdbc:postgresql://host:port/database — or use postgresql://user:pass@host:port/db in DATABASE_URL (normalized at startup).
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:P@ssw0rd}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:30}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      connection-timeout: ${DB_POOL_CONN_TIMEOUT_MS:30000}
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: sword_of_knowledge
  jackson:
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

app:
  instance:
    id: ${APP_INSTANCE_ID:local-1}
  auth:
    issuer: ${AUTH_ISSUER:sok-local-auth}
    jwt-secret: ${AUTH_JWT_SECRET:dev_change_me_local_jwt_secret_32_chars_min}
    access-ttl-seconds: ${AUTH_ACCESS_TTL_SECONDS:900}
    refresh-ttl-seconds: ${AUTH_REFRESH_TTL_SECONDS:2592000}
  admin-uids: ${ADMIN_UIDS:}
  admin-session-ttl-seconds: ${ADMIN_SESSION_TTL_SECONDS:28800}
  admin-bootstrap:
    enabled: ${ADMIN_BOOTSTRAP_ENABLED:true}
    email: ${ADMIN_BOOTSTRAP_EMAIL:admin@sof.com}
    password: ${ADMIN_BOOTSTRAP_PASSWORD:P@ssw0rd}
  game-config-refresh-ms: ${GAME_CONFIG_REFRESH_MS:5000}
  payments:
    stripe-webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
  # Client uses Firebase Auth (Google); server only needs project id to verify ID tokens (no Admin SDK).
  firebase:
    project-id: ${FIREBASE_PROJECT_ID:gen-lang-client-0938666448}
  socket:
    host: ${SOCKET_HOST:0.0.0.0}
    port: ${SOCKET_PORT:8081}
    allow-insecure: ${ALLOW_INSECURE_SOCKET:false}
    max-conn-per-minute: ${SOCKET_MAX_CONN_PER_MIN:60}
