# Build and run on the VPS: `docker compose -f deploy/docker-compose.deploy.yml up -d --build`
# Repo root `.env` holds DATABASE_URL and other app env (see .env.example).
services:
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: sok-backend:local
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "8080:8080"
      - "8081:8081"
