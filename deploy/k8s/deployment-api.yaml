apiVersion: apps/v1
kind: Deployment
metadata:
  name: sok-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sok-api
  template:
    metadata:
      labels:
        app: sok-api
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: app
          image: sok-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SOCKET_ENABLED
              value: "false"
            - name: APP_INSTANCE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
