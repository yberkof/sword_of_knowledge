# Deploy Spring backend to Contabo (Docker) on push to master.
#
# GitHub repo secrets (Settings → Secrets and variables → Actions):
#   SSH_HOST        — VPS hostname or IP
#   SSH_USER        — e.g. root or ubuntu
#   SSH_PRIVATE_KEY — private key for SSH (PEM), full multiline
#   DEPLOY_PATH     — absolute path on the server where the repo lives (must contain deploy/docker-compose.deploy.yml and .env)
#
# Server one-time setup:
#   - Install Docker + Docker Compose plugin
#   - Clone this repo to DEPLOY_PATH
#   - Create DEPLOY_PATH/.env with DATABASE_URL, DB_*, REDIS_*, AUTH_JWT_SECRET, etc.
#
name: Deploy backend

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build JAR
        run: mvn -B -q package -DskipTests

      - name: Docker image name (GHCR is lowercase)
        run: |
          echo "GHCR_IMAGE=$(echo "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: |
            ${{ env.GHCR_IMAGE }}:${{ github.sha }}
            ${{ env.GHCR_IMAGE }}:master
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Docker image name (GHCR is lowercase)
        run: |
          echo "GHCR_IMAGE=$(echo 'ghcr.io/${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            cd "${{ secrets.DEPLOY_PATH }}"
            export BACKEND_IMAGE="${{ env.GHCR_IMAGE }}:master"
            docker compose -f deploy/docker-compose.deploy.yml pull
            docker compose -f deploy/docker-compose.deploy.yml up -d --remove-orphans
            docker logout ghcr.io || true
            curl -fsS --retry 5 --retry-delay 3 "http://127.0.0.1:8080/api/health" | head -c 200
