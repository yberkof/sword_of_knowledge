# Push to master → SSH: git pull → mvn package → systemd restart → health check.
# No Docker on the VPS for this job.
#
# Secrets: SSH_HOST, SSH_USER, SSH_PRIVATE_KEY, DEPLOY_PATH (absolute repo root on server)
#
# Server one-time:
#   - OpenJDK 17 + Maven (e.g. apt install openjdk-17-jdk maven)
#   - sudo cp deploy/sok-backend.service.example /etc/systemd/system/sok-backend.service
#     Edit paths in that file, then: systemctl daemon-reload && enable --now sok-backend
#   - Repo root .env (same vars as before; systemd EnvironmentFile loads it — not Spring's dotenv)
#
# GitHub token is only used for git pull over HTTPS (private repos).
#
name: Deploy backend

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH — pull, Maven package, systemd restart
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            git checkout master
            git pull --ff-only "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" master
            mvn -B package -DskipTests
            if [ "$(id -u)" -eq 0 ]; then
              systemctl restart sok-backend
            else
              sudo -n systemctl restart sok-backend
            fi
            ok=0
            for _ in $(seq 1 25); do
              if curl -fsS --connect-timeout 2 --max-time 8 "http://127.0.0.1:8080/api/health" >/dev/null 2>&1; then
                ok=1
                break
              fi
              sleep 3
            done
            if [ "$ok" -ne 1 ]; then
              if [ "$(id -u)" -eq 0 ]; then
                journalctl -u sok-backend -n 120 --no-pager || true
              else
                sudo -n journalctl -u sok-backend -n 120 --no-pager || true
              fi
              exit 1
            fi
            curl -fsS "http://127.0.0.1:8080/api/health" | head -c 200
            echo
