# Push to master → SSH: compose down → git pull → compose up --build → health check.
# No GHCR; the VPS builds the image (multi-stage Dockerfile with Maven inside Docker).
#
# Secrets: SSH_HOST, SSH_USER, SSH_PRIVATE_KEY, DEPLOY_PATH (absolute path to repo clone on server)
#
# Server: Docker + Compose plugin only; no JDK/Maven on the host required.
# GitHub token in the job is used only for `git pull` over HTTPS (private repos).
#
name: Deploy backend

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH — pull, build, restart
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            test -f deploy/docker-compose.deploy.yml
            docker compose -f deploy/docker-compose.deploy.yml down || true
            git checkout master
            git pull --ff-only "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" master
            docker compose -f deploy/docker-compose.deploy.yml up -d --build
            ok=0
            for _ in $(seq 1 25); do
              if curl -fsS --connect-timeout 2 --max-time 8 "http://127.0.0.1:8080/api/health" >/dev/null 2>&1; then
                ok=1
                break
              fi
              sleep 3
            done
            if [ "$ok" -ne 1 ]; then
              docker compose -f deploy/docker-compose.deploy.yml logs --tail 120 backend
              exit 1
            fi
            curl -fsS "http://127.0.0.1:8080/api/health" | head -c 200
            echo
